services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: player
      POSTGRES_PASSWORD: player
      POSTGRES_DB: playerboard
    ports:
      - "5544:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U player -d playerboard"]
      interval: 3s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      target: api
    environment:
      DATABASE_URL: postgres://player:player@postgres:5432/playerboard?sslmode=disable
      NATS_URL: nats://nats:4222
      JWT_SECRET: dev-jwt-secret-change-me
      WEBHOOK_HMAC_SECRET: dev-webhook-secret-change-me
      SIGNATURE_SCHEME: hmac
      DEV_MODE: "true"
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }

  worker:
    build:
      context: .
      target: worker
    environment:
      DATABASE_URL: postgres://player:player@postgres:5432/playerboard?sslmode=disable
      NATS_URL: nats://nats:4222
      WORKER_POOL_SIZE: "4"
    depends_on:
      postgres: { condition: service_healthy }
      nats: { condition: service_healthy }
